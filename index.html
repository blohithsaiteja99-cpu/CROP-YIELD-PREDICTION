<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Yield Prediction</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4fff4;
        }

        .navbar {
            background: green;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            width: 50%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
            color: green;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        #result {
            margin-top: 20px;
            text-align: center;
            font-size: 22px;
            color: green;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <div class="navbar">
        🌾 Smart Crop Yield Prediction
    </div>

    <div class="container">

        <h2>Enter Crop Details</h2>

        <form id="predictForm">

            <label>Region</label>
            <select name="Region" required>
                <option value="North">North</option>
                <option value="South">South</option>
                <option value="East">East</option>
                <option value="West">West</option>
            </select>

            <label>Soil Type</label>
            <select name="Soil_Type" required>
                <option value="Clay">Clay</option>
                <option value="Sandy">Sandy</option>
                <option value="Loam">Loam</option>
            </select>

            <label>Crop</label>
            <select name="Crop" required>
                <option value="Rice">Rice</option>
                <option value="Wheat">Wheat</option>
                <option value="Maize">Maize</option>
                <option value="Cotton">Cotton</option>
            </select>

            <label>Weather Condition</label>
            <select name="Weather_Condition" required>
                <option value="Sunny">Sunny</option>
                <option value="Rainy">Rainy</option>
                <option value="Cloudy">Cloudy</option>
            </select>

            <label>Rainfall (mm)</label>
            <input type="number" name="Rainfall_mm" required>

            <label>Temperature (°C)</label>
            <input type="number" name="Temperature_Celsius" required>

            <label>Fertilizer Used</label>
            <input type="number" name="Fertilizer_Used" required>

            <label>Irrigation Used</label>
            <select name="Irrigation_Used">
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <label>Days to Harvest</label>
            <input type="number" name="Days_to_Harvest" required>

            <button type="submit">
                Predict Yield
            </button>

        </form>

        <div id="result"></div>

    </div>

    <script>

        document.getElementById("predictForm").addEventListener("submit", function(e) {

            e.preventDefault();

            let formData = new FormData(this);

            fetch("/predict", {

                method: "POST",
                body: formData

            })

            .then(response => response.text())

            .then(data => {

                document.getElementById("result").innerHTML = data;

            })

            .catch(error => {

                document.getElementById("result").innerHTML =
                "Error occurred!";

            });

        });

    </script>

</body>

</html>
